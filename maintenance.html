<!DOCTYPE html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oglasino - Održavanje</title>

    <!-- Tailwind CDN (for static deployment) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="h-screen w-full overflow-hidden bg-white">

    <div class="flex h-full w-full">

      <!-- LEFT SIDE (desktop image) -->
      <div class="relative hidden w-1/2 md:block">
        <img
          src="/intro.jpg"
          alt="Oglasino intro"
          class="h-full w-full object-cover"
        />
        <div class="absolute inset-0 bg-black/30"></div>
      </div>

      <!-- RIGHT SIDE -->
      <div class="relative flex flex-1 overflow-hidden bg-white">

        <!-- mobile background -->
        <div class="absolute top-0 h-full w-full md:hidden">
          <img
            src="/intro.jpg"
            alt="Oglasino intro mobile"
            class="h-full w-full object-cover opacity-70"
          />
        </div>

        <!-- blur blobs -->
        <div class="absolute -top-20 -right-20 h-60 w-60 rounded-full bg-blue-200 opacity-30 blur-3xl"></div>
        <div class="absolute bottom-0 left-0 h-40 w-40 rounded-full bg-indigo-300 opacity-30 blur-3xl"></div>

        <!-- content -->
        <div class="relative z-10 mx-auto flex h-full max-w-xl flex-col items-center justify-center px-6 text-center">

          <div class="rounded-xl border border-white/40 bg-white/80 p-8 shadow-lg backdrop-blur-md">

            <!-- icon -->
            <div class="text-6xl">🛠️</div>

            <!-- title -->
            <h1 class="mt-4 text-3xl font-semibold text-black">
              Oglasino
            </h1>

            <!-- subtitle -->
            <p class="mt-2 text-lg text-gray-900">
              Platforma je trenutno u održavanju
            </p>

            <!-- messages -->
            <p class="mt-6 text-sm leading-relaxed text-gray-700">
              Radimo na unapređenju naših usluga kako bismo vam omogućili bolje iskustvo.
            </p>

            <p class="mt-4 text-sm leading-relaxed text-gray-700">
              Molimo pokušajte ponovo kasnije. Hvala na razumijevanju i strpljenju!
            </p>
          </div>
        </div>

        <!-- footer -->
        <div class="absolute bottom-2 w-full text-center text-xs text-black">
          © <span id="year"></span> Memento Tech
        </div>

      </div>
    </div>

    <script>
      document.getElementById("year").innerText = new Date().getFullYear();
    </script>

  </body>
</html>
